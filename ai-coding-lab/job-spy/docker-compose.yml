services:
  job-spy:
    build:
      context: .
      platforms:
        - linux/arm64
    image: job-spy:latest
    container_name: job-spy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    volumes:
      - ./data:/app/data
      - ./public/photo.jpg:/app/public/photo.jpg:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
